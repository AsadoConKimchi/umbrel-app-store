version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: asadoconkimchi-bitcoin-node-visualizer_app_1
      APP_PORT: 3000
      PROXY_AUTH_ADD: "false"

  app:
    image: ghcr.io/asadoconkimchi/bitcoin-node-visualizer:v1.0.0
    restart: on-failure
    stop_grace_period: 1m
    environment:
      # Bitcoin Core RPC
      BITCOIN_RPC_HOST: ${APP_BITCOIN_NODE_IP:-bitcoin}
      BITCOIN_RPC_PORT: ${APP_BITCOIN_RPC_PORT:-8332}
      BITCOIN_RPC_USER: ${APP_BITCOIN_RPC_USER:-umbrel}
      BITCOIN_RPC_PASS: ${APP_BITCOIN_RPC_PASS:-umbrel}
      # ZMQ (optional — app falls back to RPC polling if unavailable)
      BITCOIN_ZMQ_HOST: ${APP_BITCOIN_NODE_IP:-bitcoin}
      BITCOIN_ZMQ_RAWBLOCK_PORT: 28332
      BITCOIN_ZMQ_RAWTX_PORT: 28333
      # Server
      PORT: 3000
      NODE_ENV: production
    networks:
      default:
        ipv4_address: $APP_ASADOCONKIMCHI_BITCOIN_NODE_VISUALIZER_IP
      bitcoin_default:

networks:
  default:
    name: asadoconkimchi-bitcoin-node-visualizer_default
  bitcoin_default:
    external: true
